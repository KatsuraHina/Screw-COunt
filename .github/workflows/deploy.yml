name: Deploy to Firebase

# Deploys the site (hosting) and the Firestore rules whenever changes land on
# main. You can also trigger it by hand from the GitHub Actions tab.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install the Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy hosting and Firestore rules
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-service-account.json"
          firebase deploy \
            --only hosting,firestore:rules \
            --project bbs-count-2 \
            --non-interactive
          rm -f "$RUNNER_TEMP/firebase-service-account.json"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
